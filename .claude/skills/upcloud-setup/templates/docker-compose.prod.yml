# Production Docker Compose — generated by /upcloud:setup
# Secrets are injected at runtime via: infisical run --env=prod -- docker compose up -d
#
# Template variables (replaced during setup):
#   {project_name} — project identifier
#   {domain}       — domain for Caddy auto-SSL

services:
  app:
    build: .
    container_name: {project_name}-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=8080
      # These are injected by infisical run at container start:
      # - DATABASE_URL
      # - S3_ACCESS_KEY
      # - S3_SECRET_KEY
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - app-network

  caddy:
    image: caddy:2-alpine
    container_name: {project_name}-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - app-network

volumes:
  caddy_data:
  caddy_config:

networks:
  app-network:
    driver: bridge
