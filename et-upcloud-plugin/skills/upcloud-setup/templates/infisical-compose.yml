# Infisical self-hosted — runs alongside your app on the same server
# Generated by /upcloud:setup
#
# Infisical stores secrets encrypted in its own PostgreSQL database
# (separate DB on the same managed instance, or its own container).

services:
  infisical:
    image: infisical/infisical:latest
    container_name: infisical
    restart: unless-stopped
    environment:
      - ENCRYPTION_KEY=${INFISICAL_ENCRYPTION_KEY}
      - AUTH_SECRET=${INFISICAL_AUTH_SECRET}
      - DB_CONNECTION_URI=${INFISICAL_DB_URL}
      - SITE_URL=https://${DOMAIN}/infisical
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - infisical-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/status"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  infisical-network:
    driver: bridge
